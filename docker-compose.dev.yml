services:
  api:
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./runs:/app/runs
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./runs:/app/runs
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
